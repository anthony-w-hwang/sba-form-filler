<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SBA Prequal — Chat</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #1c2f5e;
  --blue: #3d5fc4;
  --blue-light: #eef2ff;
  --blue-border: #c7d2fe;
  --green: #10b981;
  --green-light: #d1fae5;
  --yellow: #f59e0b;
  --red: #ef4444;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-700: #374151;
  --gray-900: #111827;
  --bot-bubble: #f3f4f6;
  --user-bubble: #1c2f5e;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f0f2f7;
}

/* ── Shell ── */
.shell {
  max-width: 520px;
  margin: 0 auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #fff;
  box-shadow: 0 0 40px rgba(0,0,0,0.1);
}

/* ── Header ── */
.header {
  background: #fff;
  border-bottom: 1px solid var(--gray-200);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.header-avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--navy), var(--blue));
  color: #fff;
  font-size: 13px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.header-info { flex: 1; }
.header-name { font-size: 14px; font-weight: 700; color: var(--gray-900); }
.header-status {
  font-size: 11px;
  color: var(--green);
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 1px;
}
.header-status::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
}
.progress-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.progress-label { font-size: 11px; color: var(--gray-400); white-space: nowrap; }
.progress-mini {
  width: 60px;
  height: 4px;
  background: var(--gray-200);
  border-radius: 999px;
  overflow: hidden;
}
.progress-mini-fill {
  height: 100%;
  background: var(--blue);
  border-radius: 999px;
  transition: width 0.5s ease;
}

/* ── Chat area ── */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  scroll-behavior: smooth;
}

/* ── Message rows ── */
.msg-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  max-width: 100%;
}
.msg-row.bot { justify-content: flex-start; }
.msg-row.user { justify-content: flex-end; }
.msg-row + .msg-row { margin-top: 2px; }
.msg-row.bot + .msg-row.user,
.msg-row.user + .msg-row.bot { margin-top: 14px; }

/* Bot avatar */
.bot-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--navy), var(--blue));
  color: #fff;
  font-size: 10px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-bottom: 2px;
}
.bot-avatar.hidden { visibility: hidden; }

/* Bubbles */
.bubble {
  max-width: 78%;
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.5;
  color: var(--gray-900);
}
.bubble.bot {
  background: var(--bot-bubble);
  border-bottom-left-radius: 4px;
}
.bubble.user {
  background: var(--user-bubble);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.bubble strong { font-weight: 700; }

/* Typing indicator */
.typing {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 12px 14px;
  background: var(--bot-bubble);
  border-radius: 18px;
  border-bottom-left-radius: 4px;
  width: fit-content;
}
.typing span {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--gray-400);
  animation: typingDot 1.2s infinite ease-in-out;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingDot {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* Quick reply chips */
.chips-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 8px 0 4px 36px;
}
.chip {
  border: 1.5px solid var(--blue-border);
  background: var(--blue-light);
  color: var(--navy);
  font-size: 13px;
  font-weight: 600;
  padding: 8px 14px;
  border-radius: 999px;
  cursor: pointer;
  transition: all 0.12s;
  user-select: none;
  white-space: nowrap;
}
.chip:hover { background: #dde6ff; border-color: var(--blue); }
.chip:active { transform: scale(0.96); }

/* Inline card (for forms) */
.inline-card {
  background: #fff;
  border: 1.5px solid var(--gray-200);
  border-radius: 16px;
  padding: 20px;
  margin-left: 36px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.inline-card .card-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--gray-400);
  margin-bottom: 14px;
}
.inline-card .field {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 12px;
}
.inline-card .field:last-of-type { margin-bottom: 0; }
.inline-card label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--gray-500);
}
.inline-card input,
.inline-card select {
  border: 1.5px solid var(--gray-200);
  border-radius: 9px;
  padding: 10px 13px;
  font-size: 14px;
  color: var(--gray-900);
  background: #fff;
  width: 100%;
  appearance: none;
  transition: border-color 0.15s;
}
.inline-card input:focus,
.inline-card select:focus { outline: none; border-color: var(--blue); }
.inline-card input::placeholder { color: var(--gray-300); }
.inline-card .select-wrap { position: relative; }
.inline-card .select-wrap::after {
  content: '▾';
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gray-400);
  pointer-events: none;
  font-size: 12px;
}
.inline-card .field-row { display: flex; gap: 8px; }
.inline-card .field-row .field { flex: 1; margin-bottom: 0; }
.inline-card .pct-row { display: flex; align-items: center; gap: 8px; }
.inline-card .pct-row input { width: 70px; }
.inline-card .pct-row span { font-size: 13px; color: var(--gray-500); }
.inline-card .sublabel {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--gray-400);
  margin: 10px 0 6px;
}
.card-btn {
  width: 100%;
  margin-top: 14px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: var(--navy);
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s, opacity 0.15s;
}
.card-btn:disabled { background: #a8b4d0; cursor: default; }
.card-btn:not(:disabled):hover { background: #162345; }

/* Results inline card */
.results-card {
  background: #fff;
  border: 1.5px solid var(--gray-200);
  border-radius: 16px;
  overflow: hidden;
  margin-left: 36px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.results-card-header {
  background: linear-gradient(135deg, var(--navy), #2a4a9f);
  padding: 24px 22px 20px;
  text-align: center;
}
.results-card-header .rc-emoji { font-size: 32px; margin-bottom: 10px; }
.results-card-header .rc-title { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 4px; letter-spacing: -0.3px; }
.results-card-header .rc-sub { font-size: 13px; color: rgba(255,255,255,0.7); }
.results-card-body { padding: 18px 20px; }
.check-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  background: var(--gray-50);
  border-radius: 9px;
  margin-bottom: 8px;
}
.check-icon {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  font-size: 10px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.check-pass { background: var(--green-light); color: #065f46; }
.check-warn { background: #fef3c7; color: #92400e; }
.check-label { font-size: 13px; font-weight: 700; color: var(--gray-900); margin-bottom: 1px; }
.check-detail { font-size: 11px; color: var(--gray-500); line-height: 1.4; }
.results-cta {
  width: 100%;
  margin-top: 16px;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: var(--navy);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s;
}
.results-cta:hover { background: #162345; }
.results-email-note {
  text-align: center;
  font-size: 11px;
  color: var(--gray-400);
  margin-top: 10px;
}

/* ── Input bar (for text input steps) ── */
.input-bar {
  flex-shrink: 0;
  padding: 12px 16px;
  border-top: 1px solid var(--gray-200);
  background: #fff;
  display: flex;
  gap: 8px;
  align-items: center;
}
.input-bar input {
  flex: 1;
  border: 1.5px solid var(--gray-200);
  border-radius: 24px;
  padding: 10px 16px;
  font-size: 14px;
  color: var(--gray-900);
  background: var(--gray-50);
  outline: none;
  transition: border-color 0.15s;
}
.input-bar input:focus { border-color: var(--blue); background: #fff; }
.input-bar input::placeholder { color: var(--gray-400); }
.send-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: none;
  background: var(--navy);
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, opacity 0.15s;
}
.send-btn:disabled { background: var(--gray-300); cursor: default; }
.send-btn:not(:disabled):hover { background: #162345; }

/* ── Cert row ── */
.cert-inline {
  margin-left: 36px;
  background: var(--gray-50);
  border: 1.5px solid var(--gray-200);
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.cert-inline input[type="checkbox"] {
  margin-top: 2px;
  accent-color: var(--blue);
  width: 15px;
  height: 15px;
  flex-shrink: 0;
  cursor: pointer;
}
.cert-inline label {
  font-size: 12px;
  color: var(--gray-500);
  line-height: 1.6;
  cursor: pointer;
}

/* ── Fade in ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeUp 0.22s ease forwards; }

/* ── Scrollbar ── */
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 2px; }
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <div class="header">
    <div class="header-avatar">LA</div>
    <div class="header-info">
      <div class="header-name">LendAI Assistant</div>
      <div class="header-status">Online</div>
    </div>
    <div class="progress-row">
      <div class="progress-label" id="prog-label">Step 1 of 4</div>
      <div class="progress-mini">
        <div class="progress-mini-fill" id="prog-fill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- Chat area -->
  <div class="chat-area" id="chat"></div>

  <!-- Input bar (shown for free-text steps) -->
  <div class="input-bar" id="input-bar" style="display:none;">
    <input type="text" id="text-input" placeholder="Type your answer…" onkeydown="handleInputKey(event)" oninput="updateSendBtn()" />
    <button class="send-btn" id="send-btn" disabled onclick="sendText()">➤</button>
  </div>

</div>

<script>
// ─────────────────────────────────
// State
// ─────────────────────────────────
const state = {
  bizName: '',
  email: '',
  amount: '',
  timeline: '',
  credit: '',
  age: '',
  entity: '',
  industry: '',
  address: '',
  ownerName: '',
  ownerPct: '',
  ownerAddr: '',
  ownerDob: '',
};

let currentStep = null;
let pendingTextResolve = null;

// ─────────────────────────────────
// DOM helpers
// ─────────────────────────────────
const chat = document.getElementById('chat');

function scrollBottom() {
  chat.scrollTop = chat.scrollHeight;
}

function setProgress(step, label) {
  document.getElementById('prog-fill').style.width = (step / 4 * 100) + '%';
  document.getElementById('prog-label').textContent = label;
}

// ─────────────────────────────────
// Message builders
// ─────────────────────────────────
function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row bot fade-in';
  row.id = 'typing-row';
  row.innerHTML = `
    <div class="bot-avatar">LA</div>
    <div class="typing"><span></span><span></span><span></span></div>
  `;
  chat.appendChild(row);
  scrollBottom();
  return row;
}

function removeTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}

function addBotBubble(html, showAvatar = true) {
  const row = document.createElement('div');
  row.className = 'msg-row bot fade-in';
  row.innerHTML = `
    <div class="bot-avatar ${showAvatar ? '' : 'hidden'}">LA</div>
    <div class="bubble bot">${html}</div>
  `;
  chat.appendChild(row);
  scrollBottom();
}

function addUserBubble(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user fade-in';
  row.innerHTML = `<div class="bubble user">${text}</div>`;
  chat.appendChild(row);
  scrollBottom();
}

function addChips(options, onSelect) {
  const row = document.createElement('div');
  row.className = 'chips-row fade-in';
  row.id = 'chips-row';
  options.forEach(opt => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = opt.label;
    chip.onclick = () => {
      document.getElementById('chips-row')?.remove();
      addUserBubble(opt.label);
      setTimeout(() => onSelect(opt.val, opt.label), 200);
    };
    row.appendChild(chip);
  });
  chat.appendChild(row);
  scrollBottom();
}

function addInlineCard(html, id) {
  const wrap = document.createElement('div');
  wrap.className = 'fade-in';
  wrap.id = id || 'inline-card-' + Date.now();
  wrap.innerHTML = html;
  chat.appendChild(wrap);
  scrollBottom();
  return wrap;
}

// ─────────────────────────────────
// Async helpers
// ─────────────────────────────────
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

async function botSay(html, delay = 600, showAvatar = true) {
  const t = showTyping();
  await wait(delay);
  removeTyping();
  addBotBubble(html, showAvatar);
  await wait(120);
}

async function askText(placeholder) {
  const bar = document.getElementById('input-bar');
  const input = document.getElementById('text-input');
  input.placeholder = placeholder;
  input.value = '';
  updateSendBtn();
  bar.style.display = 'flex';
  await wait(80);
  input.focus();
  return new Promise(resolve => { pendingTextResolve = resolve; });
}

function sendText() {
  const input = document.getElementById('text-input');
  const val = input.value.trim();
  if (!val || !pendingTextResolve) return;
  document.getElementById('input-bar').style.display = 'none';
  addUserBubble(val);
  const resolve = pendingTextResolve;
  pendingTextResolve = null;
  setTimeout(() => resolve(val), 200);
}

function handleInputKey(e) {
  if (e.key === 'Enter') sendText();
}

function updateSendBtn() {
  const val = document.getElementById('text-input').value.trim();
  document.getElementById('send-btn').disabled = !val;
}

// ─────────────────────────────────
// CONVERSATION FLOW
// ─────────────────────────────────
async function runConversation() {

  // ── Intro ──
  setProgress(1, 'Step 1 of 4');
  await botSay("Hi! 👋 I'm here to help you find out if you pre-qualify for an SBA loan.");
  await botSay("It takes about 3 minutes and won't affect your credit score.", 700, false);
  await botSay("Let's start — what's the name of your business?", 600, false);

  state.bizName = await askText('e.g. Sunrise Landscaping LLC');
  await botSay(`Got it. Nice to meet you, <strong>${state.bizName}</strong>. 👍`);

  // ── Step 1: Qualifying questions ──
  await botSay('How much funding are you looking for?', 700);
  await new Promise(resolve => addChips([
    { val: 'lt150k',    label: 'Under $150K' },
    { val: '150to250k', label: '$150K – $250K' },
    { val: '250to350k', label: '$250K – $350K' },
    { val: '350to500k', label: '$350K – $500K' },
    { val: 'over500k',  label: 'Over $500K' },
  ], (val, label) => { state.amount = val; state.amountLabel = label; resolve(); }));

  await botSay('Got it. How soon do you need the funding?', 600);
  await new Promise(resolve => addChips([
    { val: 'urgent',   label: '2 weeks or less' },
    { val: 'month',    label: 'About a month' },
    { val: 'flexible', label: 'No specific timeline' },
  ], (val, label) => { state.timeline = val; state.timelineLabel = label; resolve(); }));

  await botSay("Last qualifying question — what's your estimated personal credit score? No hard pull, just a ballpark.", 700);
  await new Promise(resolve => addChips([
    { val: '740plus',  label: 'Excellent — 740+' },
    { val: '700to739', label: 'Good — 700 to 739' },
    { val: '650to699', label: 'Fair — 650 to 699' },
    { val: 'lt650',    label: 'Under 650' },
    { val: 'unsure',   label: 'Not sure' },
  ], (val, label) => { state.credit = val; state.creditLabel = label; resolve(); }));

  // ── Email capture ──
  setProgress(1.5, 'Step 1 of 4');
  await botSay("Perfect. Before we go further — where should I send your results?", 700);

  await new Promise(resolve => {
    const card = addInlineCard(`
      <div class="inline-card">
        <div class="card-title">Your email</div>
        <div class="field">
          <input type="email" id="email-field" placeholder="you@example.com"
            oninput="document.getElementById('email-btn').disabled = !/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(this.value.trim())"
            onkeydown="if(event.key==='Enter' && !document.getElementById('email-btn').disabled) document.getElementById('email-btn').click()"
          />
        </div>
        <div style="font-size:11px; color:var(--gray-400); margin-top:6px;">No spam — results only. Unsubscribe anytime.</div>
        <button class="card-btn" id="email-btn" disabled>Continue →</button>
      </div>
    `);
    setTimeout(() => document.getElementById('email-field')?.focus(), 100);
    document.getElementById('email-btn').onclick = () => {
      const v = document.getElementById('email-field').value.trim();
      card.remove();
      state.email = v;
      addUserBubble(v);
      setTimeout(resolve, 200);
    };
  });

  // ── Step 2: Business profile ──
  setProgress(2, 'Step 2 of 4');
  await botSay(`Thanks! Now let me learn a bit more about ${state.bizName}.`, 600);

  await new Promise(resolve => {
    const card = addInlineCard(`
      <div class="inline-card">
        <div class="card-title">About your business</div>
        <div class="field-row">
          <div class="field">
            <label>Time in business</label>
            <div class="select-wrap">
              <select id="f-age" onchange="checkBizCard()">
                <option value="">Select</option>
                <option value="lt1">Less than 1 year</option>
                <option value="1to2">1–2 years</option>
                <option value="2to5">2–5 years</option>
                <option value="5to10">5–10 years</option>
                <option value="10plus">10+ years</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label>Entity type</label>
            <div class="select-wrap">
              <select id="f-entity" onchange="checkBizCard()">
                <option value="">Select</option>
                <option value="llc">LLC</option>
                <option value="scorp">S-Corp</option>
                <option value="ccorp">C-Corp</option>
                <option value="sole">Sole Proprietorship</option>
                <option value="partner">Partnership</option>
              </select>
            </div>
          </div>
        </div>
        <div class="field">
          <label>Industry</label>
          <div class="select-wrap">
            <select id="f-industry" onchange="checkBizCard()">
              <option value="">Select your industry</option>
              <option value="healthcare">Healthcare &amp; Medical</option>
              <option value="professional">Professional Services</option>
              <option value="technology">Technology</option>
              <option value="retail">Retail</option>
              <option value="restaurant">Restaurant &amp; Food Service</option>
              <option value="construction">Construction</option>
              <option value="manufacturing">Manufacturing</option>
              <option value="realestate">Real Estate</option>
              <option value="transportation">Transportation &amp; Logistics</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>Business address</label>
          <input type="text" id="f-addr" placeholder="Street, City, State, ZIP" oninput="checkBizCard()" />
        </div>
        <button class="card-btn" id="biz-btn" disabled>Continue →</button>
      </div>
    `, 'biz-card');

    window.checkBizCard = () => {
      const age = document.getElementById('f-age')?.value;
      const entity = document.getElementById('f-entity')?.value;
      const industry = document.getElementById('f-industry')?.value;
      const addr = document.getElementById('f-addr')?.value.trim();
      const btn = document.getElementById('biz-btn');
      if (btn) btn.disabled = !(age && entity && industry && addr);
    };

    document.getElementById('biz-btn').onclick = () => {
      state.age = document.getElementById('f-age').value;
      state.entity = document.getElementById('f-entity').value;
      state.industry = document.getElementById('f-industry').value;
      state.address = document.getElementById('f-addr').value.trim();
      const ageLabel = document.getElementById('f-age').options[document.getElementById('f-age').selectedIndex].text;
      const industryLabel = document.getElementById('f-industry').options[document.getElementById('f-industry').selectedIndex].text;
      card.remove();
      addUserBubble(`${ageLabel} · ${industryLabel} · ${state.address}`);
      setTimeout(resolve, 200);
    };
  });

  // ── Step 3: Ownership ──
  setProgress(3, 'Step 3 of 4');
  await botSay(`Almost there! Last thing — I need to know who owns 20% or more of ${state.bizName}.`, 700);
  await botSay("This won't affect your credit score — no hard pull at this stage.", 600, false);

  await new Promise(resolve => {
    const card = addInlineCard(`
      <div class="inline-card">
        <div class="card-title">Primary owner</div>
        <div class="field-row">
          <div class="field">
            <label>First name</label>
            <input type="text" id="o-first" placeholder="First" oninput="checkOwnerCard()" />
          </div>
          <div class="field">
            <label>Last name</label>
            <input type="text" id="o-last" placeholder="Last" oninput="checkOwnerCard()" />
          </div>
        </div>
        <div class="field">
          <label>Ownership %</label>
          <div class="pct-row">
            <input type="number" id="o-pct" placeholder="100" min="1" max="100" oninput="checkOwnerCard()" />
            <span>% ownership</span>
          </div>
        </div>
        <div class="sublabel">Home address</div>
        <div class="field">
          <input type="text" id="o-addr" placeholder="Street, City, State, ZIP" oninput="checkOwnerCard()" />
        </div>
        <div class="sublabel">Date of birth</div>
        <div class="field">
          <input type="text" id="o-dob" placeholder="MM/DD/YYYY" oninput="checkOwnerCard()" />
        </div>
        <button class="card-btn" id="owner-btn" disabled>Save owner info →</button>
      </div>
    `, 'owner-card');

    window.checkOwnerCard = () => {
      const btn = document.getElementById('owner-btn');
      if (!btn) return;
      const ready = ['o-first','o-last','o-pct','o-addr','o-dob']
        .every(id => document.getElementById(id)?.value.trim());
      btn.disabled = !ready;
    };

    document.getElementById('owner-btn').onclick = () => {
      state.ownerFirst = document.getElementById('o-first').value.trim();
      state.ownerLast = document.getElementById('o-last').value.trim();
      state.ownerPct = document.getElementById('o-pct').value.trim();
      state.ownerAddr = document.getElementById('o-addr').value.trim();
      state.ownerDob = document.getElementById('o-dob').value.trim();
      card.remove();
      addUserBubble(`${state.ownerFirst} ${state.ownerLast} — ${state.ownerPct}% owner`);
      setTimeout(resolve, 200);
    };
  });

  // ── Certification ──
  await botSay("One last thing — please review and confirm this before I run your prequal.", 700);

  await new Promise(resolve => {
    const wrap = document.createElement('div');
    wrap.className = 'fade-in';
    const certId = 'cert-check-' + Date.now();
    const submitId = 'cert-submit-' + Date.now();
    wrap.innerHTML = `
      <div class="cert-inline">
        <input type="checkbox" id="${certId}" onchange="
          document.getElementById('${submitId}').disabled = !this.checked;
        " />
        <label for="${certId}">
          I certify that all information is accurate and that I am authorized to act on behalf of ${state.bizName}. I grant permission for lending partners to review the applicant's credit profile. This will <strong>not</strong> impact the applicant's credit score.
        </label>
      </div>
      <div style="margin-left:36px; margin-top:10px;">
        <button class="card-btn" id="${submitId}" disabled style="border-radius:10px; padding:13px; font-size:14px;" onclick="">See if I pre-qualify →</button>
      </div>
    `;
    chat.appendChild(wrap);
    scrollBottom();
    document.getElementById(submitId).onclick = () => {
      wrap.remove();
      addUserBubble("Confirmed — see if I pre-qualify ✓");
      setTimeout(resolve, 300);
    };
  });

  // ── Processing ──
  setProgress(4, 'Complete');
  await botSay("Reviewing your answers…", 500);
  await wait(1200);
  removeTyping();
  await botSay("Running eligibility check…", 400);
  await wait(1000);
  removeTyping();

  // ── Results ──
  const checks = buildChecks();
  await botSay(`🎉 Great news, <strong>${state.bizName}</strong>!`, 500);

  const resultsCard = addInlineCard(`
    <div class="results-card">
      <div class="results-card-header">
        <div class="rc-emoji">🎉</div>
        <div class="rc-title">You're pre-approved</div>
        <div class="rc-sub">${state.bizName} meets the initial criteria for an SBA 7(a) Express loan</div>
      </div>
      <div class="results-card-body">
        ${checks.map(c => `
          <div class="check-row">
            <div class="check-icon ${c.pass ? 'check-pass' : 'check-warn'}">${c.pass ? '✓' : '!'}</div>
            <div>
              <div class="check-label">${c.label}</div>
              <div class="check-detail">${c.detail}</div>
            </div>
          </div>
        `).join('')}
        <button class="results-cta" onclick="startApp()">Start my application →</button>
        <div class="results-email-note">Results sent to ${state.email}</div>
      </div>
    </div>
  `);

  await wait(400);
  await botSay("Your results have been sent to your email. Ready to start the full application?", 800);
}

function buildChecks() {
  const creditLabels = {
    '740plus':  { pass: true,  detail: 'Excellent credit — strong qualifier' },
    '700to739': { pass: true,  detail: 'Good credit — meets SBA threshold' },
    '650to699': { pass: true,  detail: 'Fair credit — meets minimum threshold' },
    'lt650':    { pass: false, detail: 'Below typical SBA minimum — loan officer will review' },
    'unsure':   { pass: true,  detail: 'Credit to be confirmed with your loan officer' },
  };
  const ageLabels = {
    lt1:    { pass: false, detail: 'Under 1 year — may require business plan & projections' },
    '1to2': { pass: true,  detail: '1–2 years in business — meets SBA threshold' },
    '2to5': { pass: true,  detail: '2–5 years — solid operating history' },
    '5to10':{ pass: true,  detail: '5–10 years — strong business history' },
    '10plus':{ pass: true, detail: '10+ years — excellent track record' },
  };
  const industryLabels = {
    healthcare:     'Healthcare is a low-risk SBA industry',
    professional:   'Professional services — SBA-eligible',
    technology:     'Technology — SBA-eligible',
    manufacturing:  'Manufacturing — SBA-eligible',
    transportation: 'Transportation — SBA-eligible',
    retail:         'Retail — SBA-eligible',
    construction:   'Construction — SBA-eligible',
    realestate:     'Real estate — SBA-eligible',
    restaurant:     'Food service — SBA-eligible, higher scrutiny typical',
    other:          'Industry confirmed as SBA-eligible',
  };
  const loanLabel = state.amount === 'over500k'
    ? 'Exceeds Express limit — routing to standard SBA 7(a)'
    : 'Within SBA 7(a) Express limits ($500K max)';

  const c = creditLabels[state.credit] || { pass: true, detail: 'Credit confirmed' };
  const a = ageLabels[state.age] || { pass: true, detail: 'Business age confirmed' };

  return [
    { label: 'Personal credit',    pass: c.pass, detail: c.detail },
    { label: 'Time in business',   pass: a.pass, detail: a.detail },
    { label: 'Industry eligibility', pass: true, detail: industryLabels[state.industry] || 'Industry is SBA-eligible' },
    { label: 'Loan size',          pass: true, detail: loanLabel },
  ];
}

function startApp() {
  addUserBubble("Start my application →");
  setTimeout(async () => {
    await botSay("Let's do it! 🚀 Your prequal data is already loaded. I'll walk you through uploading your documents next.", 700);
    await botSay("(This is where the full application would continue — document upload, SBA form auto-fill, and e-sign.)", 700, false);
  }, 300);
}

// ── Start ──
runConversation();
</script>
